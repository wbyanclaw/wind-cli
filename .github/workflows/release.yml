# wind-cli multi-platform build + release

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Linux x86_64
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windcli-linux-x86_64
          path: target/release/windcli
          retention-days: 1

  # Linux musl (static)
  linux-musl:
    name: Linux musl (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windcli-linux-musl
          path: target/x86_64-unknown-linux-musl/release/windcli
          retention-days: 1

  # macOS x86_64
  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windcli-macos-x86_64
          path: target/x86_64-apple-darwin/release/windcli
          retention-days: 1

  # macOS ARM64
  macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windcli-macos-arm64
          path: target/aarch64-apple-darwin/release/windcli
          retention-days: 1

  # Windows x86_64
  windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Build install script
        shell: pwsh
        run: |
          Copy-Item target/x86_64-pc-windows-msvc/release/windcli.exe dist/windcli.exe
          Copy-Item install/install.ps1 dist/install.ps1
          Compress-Archive -Path dist/windcli.exe -DestinationPath dist/windcli-windows-x86_64.zip -Force
          Get-FileHash dist/windcli.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  windcli.exe" } |
            Set-Content dist/SHA256SUMS.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windcli-windows-x86_64
          path: dist/windcli.exe
          retention-days: 1

  # Upload all binaries to release
  release:
    needs: [linux, linux-musl, macos-x86_64, macos-arm64, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Prepare Linux binaries
        run: |
          mkdir -p dist
          cp artifacts/windcli-linux-x86_64/windcli dist/windcli-linux-x86_64
          cp artifacts/windcli-linux-musl/windcli dist/windcli-linux-musl
          chmod +x dist/windcli-linux-x86_64 dist/windcli-linux-musl

      - name: Prepare macOS binaries
        run: |
          cp artifacts/windcli-macos-x86_64/windcli dist/windcli-macos-x86_64
          cp artifacts/windcli-macos-arm64/windcli dist/windcli-macos-arm64
          chmod +x dist/windcli-macos-x86_64 dist/windcli-macos-arm64

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum windcli-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to release
        env:
          TAG: ${{ github.ref }}
        run: |
          gh release upload "$TAG" dist/windcli-linux-x86_64 --clobber
          gh release upload "$TAG" dist/windcli-linux-musl --clobber
          gh release upload "$TAG" dist/windcli-macos-x86_64 --clobber
          gh release upload "$TAG" dist/windcli-macos-arm64 --clobber
          gh release upload "$TAG" dist/SHA256SUMS.txt --clobber
          # Windows was built on Windows runner, download it
          mkdir -p win-dist
          cp artifacts/windcli-windows-x86_64/windcli.exe win-dist/
          gh release upload "$TAG" win-dist/windcli.exe --clobber
